services:
  - type: web
    name: loan-management-system-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRY
        value: 7d
      - key: BCRYPT_ROUNDS
        value: 10
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
